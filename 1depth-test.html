<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prototipo - Depth Anything V2</title>
<style>
  :root {
    --bg: #000000;
    --panel: #0c0c0c;
    --border: #3a3a3a;
    --accent: #e8e8e8;
    --mono: 'JetBrains Mono', monospace, sans-serif;
  }
  body {
    background: var(--bg);
    color: var(--accent);
    font-family: var(--mono);
    margin: 0;
    padding: 20px;
  }
  h1 { font-size: 16px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
  .controls { margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; max-width: 400px; }
  input[type="file"] { background: var(--panel); border: 1px solid var(--border); padding: 10px; color: var(--accent); cursor: pointer; }
  #status { font-size: 12px; color: #7a7a7a; min-height: 20px; }
  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
  }
  @media (min-width: 768px) { .grid { grid-template-columns: 1fr 1fr; } }
  .box { border: 1px solid var(--border); background: var(--panel); padding: 10px; display: flex; flex-direction: column; }
  .box span { font-size: 11px; color: #7a7a7a; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
  .canvas-container { width: 100%; aspect-ratio: 4/3; background: #000; border: 1px dashed #333; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  img, canvas { max-width: 100%; max-height: 100%; object-fit: contain; }
</style>
</head>
<body>

  <h1>Depth Anything V2 — Test de Inferencia Local</h1>
  
  <div class="controls">
    <input type="file" id="imageInput" accept="image/*">
    <div id="status">Esperando imagen...</div>
  </div>

  <div class="grid">
    <div class="box">
      <span>Original</span>
      <div class="canvas-container">
        <img id="originalImg" style="display:none;">
      </div>
    </div>
    <div class="box">
      <span>Mapa de Profundidad</span>
      <div class="canvas-container" id="depthContainer">
        </div>
    </div>
  </div>

  <script type="module">
    // Importamos Transformers.js directamente desde el CDN
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.0/dist/transformers.min.js';

    // Configuramos el entorno para priorizar caché local
    env.allowLocalModels = false; 

    let estimator = null;
    const statusEl = document.getElementById('status');
    const imgEl = document.getElementById('originalImg');
    const depthContainer = document.getElementById('depthContainer');

    async function initModel() {
      statusEl.textContent = "Descargando/cargando modelo (~30MB). Esto tardará un poco la primera vez...";
      // Cargamos el modelo Depth Anything V2 Small desde la comunidad ONNX
      estimator = await pipeline('depth-estimation', 'onnx-community/depth-anything-v2-small', {
        device: 'webgpu' // Intenta usar aceleración por hardware si está disponible
      });
      statusEl.textContent = "Modelo en memoria. Listo para procesar.";
    }

    document.getElementById('imageInput').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      // 1. Mostrar la imagen original
      const url = URL.createObjectURL(file);
      imgEl.src = url;
      imgEl.style.display = 'block';
      depthContainer.innerHTML = ''; // Limpiar canvas anterior

      // 2. Inicializar modelo si no existe
      if (!estimator) {
        await initModel();
      }

      // 3. Inferencia
      statusEl.textContent = "Procesando tensores... exigiendo CPU/GPU.";
      const t0 = performance.now();
      
      try {
        const result = await estimator(url);
        const t1 = performance.now();
        statusEl.textContent = `Procesado con éxito en ${((t1 - t0) / 1000).toFixed(2)} segundos.`;

        // 4. Renderizar el resultado
        // Transformers.js devuelve un objeto RawImage en result.depth que incluye un método toCanvas()
        const canvas = result.depth.toCanvas();
        canvas.style.width = '100%';
        canvas.style.height = '100%';
        canvas.style.objectFit = 'contain';
        depthContainer.appendChild(canvas);

      } catch (error) {
        console.error(error);
        statusEl.textContent = "Error durante el procesamiento. Revisa la consola.";
      }
    });
  </script>
</body>
</html>
